# render.yaml
services:
  - type: web
    name: ftp-verificador
    runtime: python
    repo: https://github.com/tu-usuario/tu-repo
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FTP_HOST
        value: pe01-st.hostinglabs.net
      - key: FTP_USER
        value: dirislc@pe02-st.hostinglabs.net
      - key: FTP_PASS
        value: +2xaTGHZ7N$w+r*4
